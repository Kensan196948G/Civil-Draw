name: CivilDraw CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint (TypeScript)
        run: npx tsc --noEmit

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Security Audit
        run: npm audit --audit-level=high || true

      - name: Upload dist
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  issue-factory:
    if: failure()
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Failure Report
        run: |
          mkdir -p .claudeos
          echo "CI failed" > .claudeos/ci_failure_report.txt

      - name: Upload Failure Report
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-report
          path: .claudeos/ci_failure_report.txt
